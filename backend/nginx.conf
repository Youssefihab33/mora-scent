server {
    server_name mora-scent.com www.mora-scent.com;

    charset utf-8;
    client_max_body_size 75M;

    access_log /var/log/nginx/mora-scent_access.log;
    error_log /var/log/nginx/mora-scent_error.log;

    location /backend {
        proxy_pass http://127.0.0.1:2533; # Gunicorn listens internally on this port
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/mora-scent.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/mora-scent.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.mora-scent.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = mora-scent.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name mora-scent.com www.mora-scent.com;
    return 404; # managed by Certbot




}
